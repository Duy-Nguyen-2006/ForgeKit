name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          npm install --ignore-scripts || true

      - name: Run tests
        run: npm test

      - name: Run routing tests
        run: npm run test:routing

      - name: Validate ForgeCode compatibility
        run: npm run test:forgecode

      - name: Run lint
        run: npm run lint

      - name: Run generators (full export)
        run: |
          python3 scripts/generate-forgecode.py --force
          python3 scripts/generate-codex.py --force
          python3 scripts/generate-claude.py --force
